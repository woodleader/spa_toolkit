<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBC Parser Lite</title>
    <style>
        :root {
            --bg-deep: #0f172a;
            --bg-card: #1e293b;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-secondary: #818cf8;
            --success: #22c55e;
            --warning: #f59e0b;
            --font-mono: "ui-monospace", monospace;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .back-link:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Drop Zone */
        .drop-zone {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 32px;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: var(--accent);
            background: rgba(56, 189, 248, 0.05);
        }

        .drop-zone-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            stroke: var(--accent);
            stroke-width: 1.5;
            fill: none;
        }

        .drop-zone-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .drop-zone-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .drop-zone input[type="file"] {
            display: none;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            padding: 16px 20px;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .stat-value {
            font-weight: 700;
            color: var(--accent);
            font-family: var(--font-mono);
        }

        /* Search Bar */
        .search-container {
            margin-bottom: 24px;
        }

        .search-input {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        /* Message List */
        .message-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.2s;
        }

        .message-card:hover {
            border-color: var(--accent);
        }

        .message-header {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            cursor: pointer;
            gap: 16px;
            transition: background 0.2s;
        }

        .message-header:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .message-id {
            background: var(--accent);
            color: var(--bg-deep);
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 0.85rem;
            padding: 6px 10px;
            border-radius: 6px;
            min-width: 80px;
            text-align: center;
            user-select: text;
            cursor: text;
        }

        .message-info {
            flex: 1;
            min-width: 0;
        }

        .message-name {
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 4px;
            word-break: break-word;
        }

        .message-meta {
            display: flex;
            gap: 16px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .signal-count {
            background: rgba(129, 140, 248, 0.2);
            color: var(--accent-secondary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .expand-icon {
            width: 20px;
            height: 20px;
            stroke: var(--text-secondary);
            transition: transform 0.2s;
        }

        .message-card.expanded .expand-icon {
            transform: rotate(180deg);
        }

        /* Signal List */
        .signal-list {
            display: none;
            border-top: 1px solid var(--border);
            background: var(--bg-deep);
        }

        .message-card.expanded .signal-list {
            display: block;
        }

        .signal-item {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

        .signal-item:last-child {
            border-bottom: none;
        }

        .signal-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .signal-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .signal-unit {
            color: var(--warning);
            font-size: 0.8rem;
            font-weight: 500;
        }

        .signal-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 12px;
        }

        .detail-item {
            background: var(--bg-deep);
            padding: 10px 12px;
            border-radius: 8px;
        }

        .detail-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .detail-value {
            font-family: var(--font-mono);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .formula-box {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .formula-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent);
            margin-bottom: 6px;
        }

        .formula-content {
            font-family: var(--font-mono);
            font-size: 0.9rem;
        }

        .signal-comment {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-style: italic;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed var(--border);
        }

        .value-table {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed var(--border);
        }

        .value-table-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .value-table-items {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .value-item {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
        }

        .value-key {
            font-family: var(--font-mono);
            font-weight: 600;
            color: var(--success);
        }

        .value-desc {
            color: var(--text-secondary);
            margin-left: 4px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            stroke: var(--text-secondary);
            stroke-width: 1;
            fill: none;
            opacity: 0.5;
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container {
                padding: 20px 16px;
            }

            header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }

            .stats-bar {
                flex-direction: column;
                gap: 12px;
            }

            .message-header {
                flex-wrap: wrap;
            }

            .signal-details {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>

<style data-toolkit-theme="neo-brutalist">
/* ============================================================
   TOOLBOX THEME · Neo-Brutalist 2.0
   Single source of truth for the suite-wide design system.
   scripts/build.mjs inlines this file into every tool between
   TOOLKIT:THEME:neo-brutalist markers (the tools' CSP forbids
   linked stylesheets), so edit HERE and run `npm run build`.

   Contract: one indigo accent, 2px ink borders, hard offset
   shadows, zero corner radius, heavy uppercase headings.
   Dark mode mirrors the launcher: deep navy surfaces with
   light-blue borders. Tool-specific semantic colors (sensor,
   cable, pin, diff, severity ramps) are deliberately NOT
   remapped here.
   ============================================================ */

/* ---------- base tokens: light ---------- */
:root {
    --t-bg: #e5e9fb;
    --t-panel: #ffffff;
    --t-panel2: #f4f6ff;
    --t-ink: #14141a;
    --t-ink2: #4a4a55;
    --t-line: #14141a;
    --t-accent: #4f46e5;
    --t-accent-ink: #ffffff;
    --t-accent-soft: #e5e3fb;
    --t-ok: #157f4e;
    --t-ok-bg: #dff2e8;
    --t-warn: #a16207;
    --t-warn-bg: #f8ecd2;
    --t-err: #b3261e;
    --t-err-bg: #f9e0de;
    --t-shadow-color: #14141a;
    --t-font-sans: "Helvetica Neue", Helvetica, Arial, sans-serif;
    --t-font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

/* ---------- base tokens: dark ---------- */
[data-theme="dark"],
body.dark-mode {
    --t-bg: #0d1320;
    --t-panel: #131d31;
    --t-panel2: #19243b;
    --t-ink: #f8fbff;
    --t-ink2: #c4d2eb;
    --t-line: #7db2ff;
    --t-accent: #6ea8ff;
    --t-accent-ink: #0d1320;
    --t-accent-soft: #22314f;
    --t-ok: #7dff6b;
    --t-ok-bg: #123522;
    --t-warn: #f4c542;
    --t-warn-bg: #3a2f10;
    --t-err: #ff6b6b;
    --t-err-bg: #401a1a;
    --t-shadow-color: #0a0f1d;
}

@media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
        --t-bg: #0d1320;
        --t-panel: #131d31;
        --t-panel2: #19243b;
        --t-ink: #f8fbff;
        --t-ink2: #c4d2eb;
        --t-line: #7db2ff;
        --t-accent: #6ea8ff;
        --t-accent-ink: #0d1320;
        --t-accent-soft: #22314f;
        --t-ok: #7dff6b;
        --t-ok-bg: #123522;
        --t-warn: #f4c542;
        --t-warn-bg: #3a2f10;
        --t-err: #ff6b6b;
        --t-err-bg: #401a1a;
        --t-shadow-color: #0a0f1d;
    }
}

/* ---------- map every tool's variable family onto the tokens ----
   Declared on the same selectors as the token sets so both modes
   flow automatically. Later-in-cascade beats the tools' own
   equal-specificity declarations because this block is injected
   after each tool's inline <style>. */
:root,
[data-theme="dark"],
[data-theme="light"],
body.dark-mode {
    /* md5check / json_compare family */
    --bg-primary: var(--t-bg);
    --bg-secondary: var(--t-panel);
    --bg-tertiary: var(--t-panel2);
    --bg-code: var(--t-panel2);
    --text-primary: var(--t-ink);
    --text-secondary: var(--t-ink2);
    --border-color: var(--t-line);
    --shadow: var(--t-shadow-color);
    --accent-color: var(--t-accent);
    --accent-bg: var(--t-accent-soft);
    --success-bg: var(--t-ok-bg);
    --success-text: var(--t-ok);
    --success-border: var(--t-ok);
    --error-bg: var(--t-err-bg);
    --error-text: var(--t-err);
    --error-border: var(--t-err);
    --warning-bg: var(--t-warn-bg);
    --warning-text: var(--t-warn);
    --warning-border: var(--t-warn);
    --muted-bg: var(--t-panel2);

    /* slate family (can_viz, j1939, dbc, fmea, pcb, pixel, plot_3d, screensim, adas) */
    --bg-deep: var(--t-bg);
    --bg-card: var(--t-panel);
    --card-bg: var(--t-panel);
    --border: var(--t-line);
    --accent: var(--t-accent);
    --accent-secondary: var(--t-accent);
    --accent-hover: var(--t-accent);
    --success: var(--t-ok);
    --warning: var(--t-warn);
    --danger: var(--t-err);

    /* calculator family (desiccant, glass, ip, fakra, fpdlink, gmsl2) */
    --bg-color: var(--t-bg);
    --text-color: var(--t-ink);
    --secondary-text: var(--t-ink2);
    --success-color: var(--t-ok);
    --warning-color: var(--t-warn);
    --danger-color: var(--t-err);
    --info-color: var(--t-accent);

    /* driver_reaction family */
    --bg: var(--t-bg);
    --card: var(--t-panel);
    --text: var(--t-ink);
    --muted: var(--t-ink2);
    --warn: var(--t-warn);
    --ok: var(--t-ok);

    /* latency_timer family */
    --dim-text: var(--t-ink2);

    /* launcher / regulatory_marks family */
    --panel-bg: var(--t-panel);
    --border-width: 2px;
    --shadow-offset: 5px;
    --shadow-color: var(--t-shadow-color);
    --accent-primary: var(--t-accent);
    --hover-bg: var(--t-accent-soft);
}

/* ---------- structural restyle ----------
   Deliberately conservative: layout wrappers (.container and
   friends) and semantic button/input variants (severity pickers,
   preset rows, colored ratings) are left alone. Panels are only
   restyled where the class reliably means "panel" across the
   suite. Tool-scoped fixes use :has() anchors on unique IDs. */

body {
    font-family: var(--t-font-sans);
    background-color: var(--t-bg);
    color: var(--t-ink);
}

h1, h2, h3, .section-title, .panel-title {
    font-family: var(--t-font-sans);
    text-transform: uppercase;
    letter-spacing: 0.02em;
    font-weight: 800;
}

/* many tools use gradient-clipped display headings: flatten to ink */
h1 {
    background: none !important;
    -webkit-text-fill-color: var(--t-ink) !important;
    color: var(--t-ink) !important;
}

/* panels: hard borders, hard shadows, zero radius.
   .card and .panel are real panels across the suite; page wrappers
   use .container / .main-content and are NOT listed here. */
.card, .panel, .summary-card, .math-formula-card,
.job-item, .result-box, .pgn-list-container {
    border: 2px solid var(--t-line) !important;
    border-radius: 0 !important;
    box-shadow: 5px 5px 0 var(--t-shadow-color) !important;
}

.job-item {
    box-shadow: 3px 3px 0 var(--t-shadow-color) !important;
}

/* md5check is the one tool whose .container is itself the panel */
body:has(#drop-zone) .container {
    border: 2px solid var(--t-line);
    border-radius: 0;
    box-shadow: 5px 5px 0 var(--t-shadow-color);
    background: var(--t-panel);
}

/* inputs: zero-specificity defaults so any tool-specific styling
   (colored ratings, severity selects, diff editors) wins */
:where(input[type="text"], input[type="number"], input[type="search"], select, textarea) {
    border: 2px solid var(--t-line);
    border-radius: 0;
    background-color: var(--t-panel);
    color: var(--t-ink);
}

/* generic action buttons only; mode/level/preset variants with
   semantic colors are intentionally not forced */
.btn, .btn-primary, .btn-compare, .btn-clear,
.tab-btn.active, .format-btn.active {
    background: var(--t-accent) !important;
    color: var(--t-accent-ink) !important;
    border: 2px solid var(--t-line) !important;
    border-radius: 0 !important;
    box-shadow: 3px 3px 0 var(--t-shadow-color) !important;
    font-weight: 700;
}

.btn-secondary, .tab-btn:not(.active), .format-btn:not(.active) {
    background: var(--t-panel) !important;
    color: var(--t-ink) !important;
    border: 2px solid var(--t-line) !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    font-weight: 700;
}

.btn:active, .btn-primary:active, .btn-compare:active, .btn-clear:active, .tab-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--t-shadow-color) !important;
}

/* md5check drop zone */
#drop-zone {
    border: 3px dashed var(--t-line) !important;
    border-radius: 0 !important;
    background: var(--t-panel2) !important;
    color: var(--t-ink2);
    font-weight: 700;
}

#drop-zone.drag-over {
    border-color: var(--t-accent) !important;
    background: var(--t-accent-soft) !important;
}

/* tables: only the classes verified as plain data tables */
.breakdown-table th, .pgn-list-table th {
    color: var(--t-ink);
    font-weight: 800;
    text-transform: uppercase;
    font-size: 0.75em;
    border-bottom: 2px solid var(--t-line);
}

/* standardized back-to-toolbox link: every tool gets the injected
   #toolkit-back-link chip (bottom-left, mirroring the theme toggle
   bottom-right); the tools' scattered legacy back links are hidden */
a[href="../index.html"]:not(#toolkit-back-link) {
    display: none !important;
}

#toolkit-back-link {
    position: fixed;
    bottom: 14px;
    left: 14px;
    z-index: 1000;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 16px;
    font-family: var(--t-font-sans);
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    text-decoration: none;
    color: var(--t-ink);
    background: var(--t-panel);
    border: 2px solid var(--t-line);
    box-shadow: 3px 3px 0 var(--t-shadow-color);
}

#toolkit-back-link:hover {
    background: var(--t-accent);
    color: var(--t-accent-ink);
}

#toolkit-back-link:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--t-shadow-color);
}

@media print {
    #toolkit-back-link, #toolkit-theme-toggle { display: none !important; }
}

/* dark-mode toggle: covers pre-existing .theme-toggle buttons and
   the injected TOOLKIT toggle */
.theme-toggle, #toolkit-theme-toggle {
    border: 2px solid var(--t-line) !important;
    border-radius: 0 !important;
    background: var(--t-panel) !important;
    color: var(--t-ink) !important;
    box-shadow: 3px 3px 0 var(--t-shadow-color) !important;
    cursor: pointer;
}

.theme-toggle:active, #toolkit-theme-toggle:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--t-shadow-color) !important;
}

/* toggle icons follow the theme ink, never hardcoded strokes */
.theme-toggle svg {
    stroke: currentColor !important;
}

#toolkit-theme-toggle {
    position: fixed;
    bottom: 14px;
    right: 14px;
    z-index: 1000;
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
}

#toolkit-theme-toggle svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
}
</style>

        <header>
            <h1>DBC Parser Lite</h1>
            <a href="../index.html" class="back-link">Return to Toolbox</a>
        </header>

        <!-- Drop Zone -->
        <div class="drop-zone" id="dropZone">
            <svg class="drop-zone-icon" viewBox="0 0 24 24">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="12" y1="18" x2="12" y2="12"></line>
                <line x1="9" y1="15" x2="12" y2="12"></line>
                <line x1="15" y1="15" x2="12" y2="12"></line>
            </svg>
            <div class="drop-zone-title">Drop your .dbc file here</div>
            <div class="drop-zone-subtitle">or click to browse</div>
            <input type="file" id="fileInput" accept=".dbc">
        </div>

        <!-- Stats Bar -->
        <div class="stats-bar hidden" id="statsBar">
            <div class="stat-item">
                <span class="stat-label">File:</span>
                <span class="stat-value" id="fileName">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Messages:</span>
                <span class="stat-value" id="messageCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Signals:</span>
                <span class="stat-value" id="signalCount">0</span>
            </div>
        </div>

        <!-- Search -->
        <div class="search-container hidden" id="searchContainer">
            <input type="text" class="search-input" id="searchInput" placeholder="Search messages and signals...">
        </div>

        <!-- Message List -->
        <div class="message-list" id="messageList">
            <div class="empty-state" id="emptyState">
                <svg class="empty-state-icon" viewBox="0 0 24 24">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <p>No DBC file loaded.<br>Drop a file above to get started.</p>
            </div>
        </div>
    </div>

    <script>
        // Global state
        let dbcData = {
            messages: [],
            comments: {},        // { msgId: comment, msgId.signalName: comment }
            valueTables: {}      // { msgId.signalName: { value: desc, ... } }
        };

        // DOM Elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const statsBar = document.getElementById('statsBar');
        const searchContainer = document.getElementById('searchContainer');
        const searchInput = document.getElementById('searchInput');
        const messageList = document.getElementById('messageList');
        const emptyState = document.getElementById('emptyState');

        // Event Listeners
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.name.endsWith('.dbc')) {
                loadFile(file);
            }
        });
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) loadFile(file);
        });
        searchInput.addEventListener('input', filterMessages);

        // Load file
        function loadFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result;
                parseDBC(content);
                document.getElementById('fileName').textContent = file.name;
                statsBar.classList.remove('hidden');
                searchContainer.classList.remove('hidden');
                emptyState.classList.add('hidden');
                renderMessages();
            };
            reader.readAsText(file);
        }

        // Parse DBC file
        function parseDBC(content) {
            dbcData = {
                messages: [],
                comments: {},
                valueTables: {}
            };

            const lines = content.split('\n');
            let currentMessage = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();

                // Message definition: BO_ <CAN-ID> <MessageName>: <MessageLength> <SendingNode>
                if (line.startsWith('BO_ ')) {
                    const match = line.match(/BO_\s+(\d+)\s+(\w+)\s*:\s*(\d+)\s+(\w+)/);
                    if (match) {
                        const rawId = parseInt(match[1]);
                        // DBC format: extended (29-bit) CAN IDs have bit 31 set (0x80000000)
                        const isExtended = rawId > 0x7FFFFFFF;
                        const canId = isExtended ? (rawId & 0x1FFFFFFF) : rawId;

                        currentMessage = {
                            id: canId,
                            isExtended: isExtended,
                            name: match[2],
                            dlc: parseInt(match[3]),
                            transmitter: match[4],
                            signals: []
                        };
                        dbcData.messages.push(currentMessage);
                    }
                }

                // Signal definition: SG_ <SignalName> : <StartBit>|<Length>@<ByteOrder><ValueType> (<Factor>,<Offset>) [<Min>|<Max>] "<Unit>" <Receiver>
                else if (line.startsWith('SG_ ') && currentMessage) {
                    const match = line.match(/SG_\s+(\w+)\s*(?:(\w+)\s*)?:\s*(\d+)\|(\d+)@([01])([+-])\s*\(([^,]+),([^)]+)\)\s*\[([^|]+)\|([^\]]+)\]\s*"([^"]*)"\s*(.*)/);
                    if (match) {
                        const signal = {
                            name: match[1],
                            muxIndicator: match[2] || null,
                            startBit: parseInt(match[3]),
                            length: parseInt(match[4]),
                            byteOrder: match[5] === '1' ? 'little' : 'big',
                            signed: match[6] === '-',
                            factor: parseFloat(match[7]),
                            offset: parseFloat(match[8]),
                            min: parseFloat(match[9]),
                            max: parseFloat(match[10]),
                            unit: match[11],
                            receivers: match[12].trim().split(',').map(r => r.trim()).filter(Boolean)
                        };
                        currentMessage.signals.push(signal);
                    }
                }

                // Comments: CM_ [SG_|BO_] <ID> [<SignalName>] "<Comment>";
                else if (line.startsWith('CM_ ')) {
                    // Message comment
                    const msgMatch = line.match(/CM_\s+BO_\s+(\d+)\s+"([^"]*)"/);
                    if (msgMatch) {
                        dbcData.comments[msgMatch[1]] = msgMatch[2];
                    }
                    // Signal comment
                    const sigMatch = line.match(/CM_\s+SG_\s+(\d+)\s+(\w+)\s+"([^"]*)"/);
                    if (sigMatch) {
                        dbcData.comments[`${sigMatch[1]}.${sigMatch[2]}`] = sigMatch[3];
                    }
                }

                // Value descriptions: VAL_ <CAN-ID> <SignalName> <Value> "<Description>" ... ;
                else if (line.startsWith('VAL_ ') && !line.startsWith('VAL_TABLE_')) {
                    const valMatch = line.match(/VAL_\s+(\d+)\s+(\w+)\s+(.*);?/);
                    if (valMatch) {
                        const key = `${valMatch[1]}.${valMatch[2]}`;
                        const valPairs = valMatch[3].match(/(\d+)\s+"([^"]*)"/g);
                        if (valPairs) {
                            dbcData.valueTables[key] = {};
                            valPairs.forEach(pair => {
                                const pairMatch = pair.match(/(\d+)\s+"([^"]*)"/);
                                if (pairMatch) {
                                    dbcData.valueTables[key][pairMatch[1]] = pairMatch[2];
                                }
                            });
                        }
                    }
                }
            }

            // Update stats
            const totalSignals = dbcData.messages.reduce((sum, m) => sum + m.signals.length, 0);
            document.getElementById('messageCount').textContent = dbcData.messages.length;
            document.getElementById('signalCount').textContent = totalSignals;
        }

        // Render messages
        function renderMessages(filter = '') {
            const safe = ToolboxSafeDocument.escapeHtml;
            const filterLower = filter.toLowerCase();
            messageList.innerHTML = '';

            const filteredMessages = dbcData.messages.filter(msg => {
                if (!filter) return true;
                if (msg.name.toLowerCase().includes(filterLower)) return true;
                if (msg.id.toString(16).includes(filterLower)) return true;
                return msg.signals.some(sig => sig.name.toLowerCase().includes(filterLower));
            });

            if (filteredMessages.length === 0) {
                messageList.innerHTML = `
                    <div class="empty-state">
                        <p>No messages match your search.</p>
                    </div>
                `;
                return;
            }

            filteredMessages.forEach(msg => {
                const card = document.createElement('div');
                card.className = 'message-card';
                card.innerHTML = `
                    <div class="message-header" onclick="toggleMessage(this)">
                        <div class="message-id" onclick="event.stopPropagation()">0x${msg.id.toString(16).toUpperCase()}${msg.isExtended ? ' <span style="font-size:0.65rem;opacity:0.7">EXT</span>' : ''}</div>
                        <div class="message-info">
                            <div class="message-name">${safe(msg.name)}</div>
                            <div class="message-meta">
                                <span>DLC: ${msg.dlc}</span>
                                <span>TX: ${safe(msg.transmitter)}</span>
                            </div>
                        </div>
                        <div class="signal-count">${msg.signals.length} signal${msg.signals.length !== 1 ? 's' : ''}</div>
                        <svg class="expand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </div>
                    <div class="signal-list">
                        ${msg.signals.map(sig => renderSignal(msg.id, sig)).join('')}
                    </div>
                `;
                messageList.appendChild(card);
            });
        }

        // Render signal
        function renderSignal(msgId, signal) {
            const safe = ToolboxSafeDocument.escapeHtml;
            const commentKey = `${msgId}.${signal.name}`;
            const comment = dbcData.comments[commentKey];
            const valueTable = dbcData.valueTables[commentKey];

            let valueTableHtml = '';
            if (valueTable) {
                const items = Object.entries(valueTable).map(([k, v]) =>
                    `<div class="value-item"><span class="value-key">${safe(k)}</span><span class="value-desc">= ${safe(v)}</span></div>`
                ).join('');
                valueTableHtml = `
                    <div class="value-table">
                        <div class="value-table-title">Value Definitions</div>
                        <div class="value-table-items">${items}</div>
                    </div>
                `;
            }

            let commentHtml = '';
            if (comment) {
                commentHtml = `<div class="signal-comment">${escapeHtml(comment)}</div>`;
            }

            return `
                <div class="signal-item">
                    <div class="signal-header">
                        <span class="signal-name">${safe(signal.name)}</span>
                        ${signal.unit ? `<span class="signal-unit">[${safe(signal.unit)}]</span>` : ''}
                    </div>
                    <div class="signal-details">
                        <div class="detail-item">
                            <div class="detail-label">Start Bit</div>
                            <div class="detail-value">${signal.startBit}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Length</div>
                            <div class="detail-value">${signal.length} bit${signal.length !== 1 ? 's' : ''}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Byte Order</div>
                            <div class="detail-value">${signal.byteOrder === 'little' ? 'Little (Intel)' : 'Big (Motorola)'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Type</div>
                            <div class="detail-value">${signal.signed ? 'Signed' : 'Unsigned'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Factor</div>
                            <div class="detail-value">${signal.factor}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Offset</div>
                            <div class="detail-value">${signal.offset}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Min</div>
                            <div class="detail-value">${signal.min}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Max</div>
                            <div class="detail-value">${signal.max}</div>
                        </div>
                    </div>
                    <div class="formula-box">
                        <div class="formula-label">Physical Value Formula</div>
                        <div class="formula-content">physical = ${signal.offset} + ${signal.factor} × raw</div>
                    </div>
                    ${valueTableHtml}
                    ${commentHtml}
                </div>
            `;
        }

        // Toggle message expansion
        function toggleMessage(header) {
            header.parentElement.classList.toggle('expanded');
        }

        // Filter messages
        function filterMessages() {
            renderMessages(searchInput.value);
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
<!-- TOOLKIT:THEME:toggle:START -->
<button id="toolkit-theme-toggle" aria-label="Toggle dark mode">
<svg id="toolkit-theme-sun" viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
<svg id="toolkit-theme-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
</button>
<script data-toolkit-runtime="theme-toggle">
(function () {
  var KEY = 'toolbox-theme';
  var root = document.documentElement;
  var sun = document.getElementById('toolkit-theme-sun');
  var moon = document.getElementById('toolkit-theme-moon');
  var media = window.matchMedia('(prefers-color-scheme: dark)');
  function apply(theme) {
    root.dataset.theme = theme;
    sun.style.display = theme === 'dark' ? 'block' : 'none';
    moon.style.display = theme === 'dark' ? 'none' : 'block';
  }
  var stored = null;
  try { stored = localStorage.getItem(KEY); } catch (error) { stored = null; }
  var theme = stored || (media.matches ? 'dark' : 'light');
  apply(theme);
  document.getElementById('toolkit-theme-toggle').addEventListener('click', function () {
    theme = theme === 'dark' ? 'light' : 'dark';
    try { localStorage.setItem(KEY, theme); } catch (error) { /* private mode */ }
    apply(theme);
  });
  media.addEventListener('change', function (event) {
    var manual = null;
    try { manual = localStorage.getItem(KEY); } catch (error) { manual = null; }
    if (!manual) {
      theme = event.matches ? 'dark' : 'light';
      apply(theme);
    }
  });
}());
</script>
<!-- TOOLKIT:THEME:toggle:END -->
